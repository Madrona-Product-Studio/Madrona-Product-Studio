<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>OG Image — 1200x630</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #888; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .og {
    width: 1200px; height: 630px;
    background: #faf8f5;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Inter', system-ui, sans-serif;
    flex-shrink: 0;
  }
  .wordmark {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 48px;
  }
  .dot {
    width: 20px; height: 20px;
    border-radius: 50%;
    background: #c4553a;
    flex-shrink: 0;
  }
  .name {
    font-size: 30px;
    font-weight: 500;
    color: #1a1a1a;
    letter-spacing: -0.3px;
  }
  .name span {
    font-weight: 300;
    color: #4a4a4a;
  }
  .tagline {
    font-size: 54px;
    font-weight: 500;
    color: #1a1a1a;
    letter-spacing: -0.5px;
    text-align: center;
    line-height: 1.2;
    max-width: 700px;
  }
  .url {
    margin-top: 48px;
    font-size: 20px;
    font-weight: 400;
    color: #c4553a;
  }
</style>
</head>
<body>
  <div class="og">
    <div class="wordmark">
      <div class="dot"></div>
      <div class="name">madrona <span>product studio</span></div>
    </div>
    <div class="tagline">We turn ideas into<br>working products.</div>
    <div class="url">madronaproduct.com</div>
  </div>
</body>
</html>
